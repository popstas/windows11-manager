name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  node-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-optional

      - name: Lint
        run: npx eslint src/

      - name: Test
        run: npx vitest run

  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/src-tauri

      - name: Install Node dependencies
        run: |
          npm install
          cd tauri-app && npm install

      - name: Build
        run: cd tauri-app/src-tauri && cargo build

      - name: Clippy
        run: cd tauri-app/src-tauri && cargo clippy -- -D warnings

      - name: Test
        run: cd tauri-app/src-tauri && cargo test
